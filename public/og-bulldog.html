<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    position: relative;
    background: #111;
  }
  img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.75;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 3rem 4rem;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
  }
  h1 {
    font-size: 4rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  p {
    font-size: 2rem;
    color: #d1d5db;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
  <img src="/Bulldog-1.webp" alt="Bulldog">
  <div class="overlay">
    <h1>Forbidden Burrito</h1>
    <p>Poke that belly!</p>
  </div>
</body>
</html>
