<body>

<div id="time-slider">
  <div class="slider-wrap">
    <div id="slider-bubble" class="slider-bubble">1s</div>
    <div id="slider-root" class="slider-root">
      <div class="slider-track">
        <div id="slider-range" class="slider-range" style="width:0%"></div>

  </div>
  <p class="slider-hint">Change the jiggle duration with the slider.</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from "three";

const MAX_RIPPLES = 1;
const BELLY = { cx: 0.369, cy: 0.32, rx: 0.075, ry: 0.07, yMax: 0.39 };
const CUTOFF_Y = 0.293;
const CUTOFF_X2 = 0.46;
const CUTOFF_X3 = 0.46;
const CUTOFF_Y3 = 0.30;
const MARKER_X = 0.453;
const MARKER_Y = 0.305;
const DIAG_DX = MARKER_X - (BELLY.cx + BELLY.rx);
const DIAG_DY = MARKER_Y - CUTOFF_Y;
const JIGGLE_LEFT  = 0.12;
const JIGGLE_RIGHT = 0.71;

const IMG = "/Bulldog-1.webp";

const vert = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position.xy, 0.0, 1.0);
}`;

const frag = `
precision highp float;
uniform sampler2D uTexture;
uniform float     uTime;
uniform float     uAspect;
uniform vec4      uRipples[1];
uniform vec2      uBellyC;
uniform vec2      uBellyRad;
uniform float     uBellyYMax;
uniform float     uCutoffY;
uniform float     uCutoffX2;
uniform float     uCutoffX3;
uniform float     uCutoffY3;
uniform float     uJiggleDuration;
uniform float     uMaxAge;
uniform float     uDiagDx;
uniform float     uDiagDy;
uniform float     uJiggleLeft;
uniform float     uJiggleRight;
varying vec2 vUv;

float dogMask(vec2 uv) {
  vec4  c      = texture2D(uTexture, clamp(uv, 0.001, 0.999));
  float warmth = c.r - c.b;
  return smoothstep(-0.15, 0.3, warmth);
}

float bellyMask(vec2 uv) {
  if (uv.y > uBellyYMax) return 0.0;
  float rightEdge = uBellyC.x + uBellyRad.x;
  float cross = uDiagDx * (uv.y - uCutoffY) - uDiagDy * (uv.x - rightEdge);
  if (cross < 0.0) return 0.0;
  float edgeFade = 1.0;
  edgeFade *= smoothstep(uJiggleLeft - 0.04, uJiggleLeft + 0.04, uv.x);
  edgeFade *= 1.0 - smoothstep(uJiggleRight - 0.04, uJiggleRight + 0.04, uv.x);
  if (uv.x > rightEdge)
    edgeFade *= smoothstep(uCutoffY - 0.01, uCutoffY + 0.01, uv.y);
  if (uv.x > uCutoffX3)
    edgeFade *= smoothstep(uBellyC.y - 0.01, uBellyC.y + 0.01, uv.y);
  vec2  d     = (uv - uBellyC) / uBellyRad;
  float yFade = smoothstep(uBellyYMax, uBellyYMax - 0.06, uv.y);
  return smoothstep(1.1, 0.0, length(d)) * yFade * dogMask(uv) * edgeFade;
}

void main() {
  vec2 disp = vec2(0.0);
  float hlEase = 0.0;
  for (int i = 0; i < 1; i++) {
    float t0 = uRipples[i].z;
    if (t0 < 0.0) continue;
    float age = uTime - t0;
    if (age > uMaxAge) continue;
    vec2  ctr  = uRipples[i].xy;
    float jStr = uRipples[i].w;
    vec2  diff = vUv - ctr;
    diff.x *= uAspect;
    float dist = length(diff);
    float ease = 1.0 - smoothstep(0.0, uJiggleDuration, age);
    hlEase = ease;
    float decay = ease * exp(-dist * 4.5);
    float wave  = sin(dist * 38.0 - age * 14.0) * 0.016 * decay;
    if (dist > 0.001) {
      vec2 dir = diff / dist;
      dir.x /= uAspect;
      disp  += dir * wave;
    }
    if (jStr > 0.0) {
      float rightEdge  = uBellyC.x + uBellyRad.x;
      float edgeFadeX  = smoothstep(rightEdge - 0.01, rightEdge, vUv.x);
      float edgeFadeX3 = smoothstep(uCutoffX3 - 0.01, uCutoffX3, vUv.x)
                        * step(vUv.y, uBellyC.y);
      float edgeMask   = bellyMask(vUv) * (1.0 - edgeFadeX) * (1.0 - edgeFadeX3);

      float squish = sin(age * 22.0) * ease * jStr * 0.011 * edgeMask;
      disp.y += squish;
      disp.x += squish * 0.25;
    }
  }
  float bellyBottom = uBellyC.y - uBellyRad.y;
  float bottomCut   = smoothstep(bellyBottom - 0.02, bellyBottom, vUv.y);
  float mask = dogMask(vUv) * mix(bellyMask(vUv), 1.0, bottomCut);
  float rightEdge = uBellyC.x + uBellyRad.x;
  if (vUv.x > rightEdge)
    mask *= smoothstep(uCutoffY - 0.01, uCutoffY + 0.01, vUv.y);
  if (vUv.x > uCutoffX3)
    mask *= smoothstep(uBellyC.y - 0.01, uBellyC.y + 0.01, vUv.y);
  mask *= smoothstep(uJiggleLeft - 0.04, uJiggleLeft + 0.04, vUv.x);
  mask *= 1.0 - smoothstep(uJiggleRight - 0.04, uJiggleRight + 0.04, vUv.x);
  vec2  uv   = vUv + disp * mask;
  gl_FragColor = texture2D(uTexture, clamp(uv, 0.001, 0.999));
}`;

const container = document.getElementById("container");
const el = container;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(el.clientWidth, el.clientHeight);
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;
el.insertBefore(renderer.domElement, el.firstChild);

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const ripples = Array.from({ length: MAX_RIPPLES }, () => new THREE.Vector4(0, 0, -1, 0));
const clock = new THREE.Clock();

const uniforms = {
  uTexture:     { value: null },
  uTime:        { value: 0 },
  uAspect:      { value: el.clientWidth / el.clientHeight },
  uRipples:     { value: ripples },
  uBellyC:      { value: new THREE.Vector2(BELLY.cx, BELLY.cy) },
  uBellyRad:    { value: new THREE.Vector2(BELLY.rx, BELLY.ry) },
  uBellyYMax:   { value: BELLY.yMax },
  uCutoffY:     { value: CUTOFF_Y },
  uCutoffX2:    { value: CUTOFF_X2 },
  uCutoffX3:    { value: CUTOFF_X3 },
  uCutoffY3:    { value: CUTOFF_Y3 },
  uJiggleDuration: { value: 1.0 },
  uMaxAge:         { value: 1.0 },
  uDiagDx:         { value: DIAG_DX },
  uDiagDy:         { value: DIAG_DY },
  uJiggleLeft:     { value: JIGGLE_LEFT },
  uJiggleRight:    { value: JIGGLE_RIGHT },
};

scene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShaderMaterial({ uniforms, vertexShader: vert, fragmentShader: frag })
));

const fragOverlay = `
precision highp float;
uniform sampler2D uTexture;
uniform float     uTime;
uniform float     uAspect;
uniform vec4      uRipples[1];
uniform vec2      uBellyC;
uniform vec2      uBellyRad;
uniform float     uBellyYMax;
uniform float     uCutoffY;
uniform float     uCutoffX3;
uniform float     uJiggleDuration;
uniform float     uMaxAge;
uniform float     uDiagDx;
uniform float     uDiagDy;
uniform float     uJiggleLeft;
uniform float     uJiggleRight;
varying vec2 vUv;

float dogMask(vec2 uv) {
  vec4  c = texture2D(uTexture, clamp(uv, 0.001, 0.999));
  return smoothstep(-0.15, 0.3, c.r - c.b);
}

float bellyMaskFull(vec2 uv) {
  if (uv.y > uBellyYMax) return 0.0;
  float bellyBottom = uBellyC.y - uBellyRad.y;
  if (uv.y < bellyBottom + 0.02) return 0.0;
  float rightEdge = uBellyC.x + uBellyRad.x;
  float cross = uDiagDx * (uv.y - uCutoffY) - uDiagDy * (uv.x - rightEdge);
  if (cross < 0.0) return 0.0;
  float edgeFade = 1.0;
  edgeFade *= smoothstep(uJiggleLeft - 0.04, uJiggleLeft + 0.04, uv.x);
  edgeFade *= 1.0 - smoothstep(uJiggleRight - 0.04, uJiggleRight + 0.04, uv.x);
  if (uv.x > rightEdge)
    edgeFade *= smoothstep(uCutoffY - 0.01, uCutoffY + 0.01, uv.y);
  if (uv.x > uCutoffX3)
    edgeFade *= smoothstep(uBellyC.y - 0.01, uBellyC.y + 0.01, uv.y);
  vec2  d     = (uv - uBellyC) / uBellyRad;
  float yFade = smoothstep(uBellyYMax, uBellyYMax - 0.06, uv.y);
  return smoothstep(1.0, 0.0, length(d)) * yFade * dogMask(uv) * edgeFade;
}

void main() {
  float bm = bellyMaskFull(vUv);
  if (bm < 0.01) { gl_FragColor = vec4(0.0); return; }

  vec2 disp = vec2(0.0);
  float hlEase = 0.0;
  for (int i = 0; i < 1; i++) {
    float t0 = uRipples[i].z;
    if (t0 < 0.0) continue;
    float age = uTime - t0;
    if (age > uMaxAge) continue;
    float jStr = uRipples[i].w;
    vec2  diff = vUv - uRipples[i].xy;
    diff.x    *= uAspect;
    float dist = length(diff);
    float ease = 1.0 - smoothstep(0.0, uJiggleDuration, age);
    hlEase = ease;
    float decay = ease * exp(-dist * 4.5);
    float wave  = sin(dist * 38.0 - age * 14.0) * 0.016 * decay;
    if (dist > 0.001) {
      vec2 dir = diff / dist;
      dir.x   /= uAspect;
      disp    += dir * wave;
    }
    if (jStr > 0.0) {
      float squish = sin(age * 22.0) * ease * jStr * 0.011 * bm;
      disp.y += squish;
      disp.x += squish * 0.25;
    }
  }

  vec2 uv      = clamp(vUv + disp * bm, 0.001, 0.999);
  vec4 color   = texture2D(uTexture, uv);
  gl_FragColor = vec4(color.rgb, bm);
}`;

const overlayMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShaderMaterial({
    uniforms,
    vertexShader: vert,
    fragmentShader: fragOverlay,
    transparent: true,
    depthTest: false,
  })
);
overlayMesh.renderOrder = 1;
scene.add(overlayMesh);

new THREE.TextureLoader().load(IMG, tex => {
  tex.colorSpace = THREE.LinearSRGBColorSpace;
  tex.minFilter  = THREE.LinearFilter;
  uniforms.uTexture.value = tex;
});

function isInBelly(uvX, uvY) {
  if (uvY >= BELLY.yMax) return false;
  const dx = (uvX - BELLY.cx) / BELLY.rx;
  const dy = (uvY - BELLY.cy) / BELLY.ry;
  return Math.sqrt(dx * dx + dy * dy) < 1.0;
}

const getUV = (e) => {
  const r   = el.getBoundingClientRect();
  return {
    uvX: (e.clientX - r.left) / r.width,
    uvY: 1 - (e.clientY - r.top) / r.height,
  };
};

el.addEventListener("pointerdown", e => {
  const { uvX, uvY } = getUV(e);
  if (!isInBelly(uvX, uvY)) return;
  const dx = (uvX - BELLY.cx) / BELLY.rx;
  const dy = (uvY - BELLY.cy) / BELLY.ry;
  const d  = Math.sqrt(dx * dx + dy * dy);
  ripples[0].set(uvX, uvY, clock.getElapsedTime(), (1 - d) * 2.5);
});

el.addEventListener("pointermove", e => {
  const { uvX, uvY } = getUV(e);
  el.style.cursor = isInBelly(uvX, uvY) ? "pointer" : "default";
});

new ResizeObserver(() => {
  renderer.setSize(el.clientWidth, el.clientHeight);
  uniforms.uAspect.value = el.clientWidth / el.clientHeight;
}).observe(el);

/* ---------- custom slider ---------- */
const sliderRoot  = document.getElementById("slider-root");
const sliderRange = document.getElementById("slider-range");
const sliderThumb = document.getElementById("slider-thumb");
const sliderBubble = document.getElementById("slider-bubble");
const STOPS = 3;
const durations = [1, 3, 6, 999];
const bubbleLabels = ["1s", "3s", "6s", "till the end of time"];
let sliderIdx = 0;

function updateSlider(idx) {
  sliderIdx = idx;
  const pct = (idx / STOPS) * 100;
  sliderRange.style.width = pct + "%";
  sliderThumb.style.left = pct + "%";
  sliderBubble.style.left = pct + "%";
  sliderBubble.style.transform = pct <= 5 ? "translateX(0)" : pct >= 95 ? "translateX(-100%)" : "translateX(-50%)";
  sliderBubble.textContent = bubbleLabels[idx];
  const dur = durations[idx];
  const oldDur = uniforms.uJiggleDuration.value;
  if (ripples[0].z >= 0 && dur < oldDur) {
    const age = clock.getElapsedTime() - ripples[0].z;
    ripples[0].z = Math.max(0, clock.getElapsedTime() - Math.min(age / oldDur, 1.0) * dur);
  }
  uniforms.uJiggleDuration.value = dur;
  uniforms.uMaxAge.value = dur;
}

function sliderIdxFromEvent(e) {
  const rect = sliderRoot.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return Math.round((Math.max(0, Math.min(1, x / rect.width))) * STOPS);
}

sliderRoot.addEventListener("pointerdown", e => {
  updateSlider(sliderIdxFromEvent(e));
  const onMove = e2 => { updateSlider(sliderIdxFromEvent(e2)); };
  const onUp = () => {
    document.removeEventListener("pointermove", onMove);
    document.removeEventListener("pointerup", onUp);
  };
  document.addEventListener("pointermove", onMove);
  document.addEventListener("pointerup", onUp);
});

sliderThumb.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" || e.key === "ArrowDown")  updateSlider(Math.max(0, sliderIdx - 1));
  if (e.key === "ArrowRight" || e.key === "ArrowUp")   updateSlider(Math.min(STOPS, sliderIdx + 1));
});

/* ---------- debug overlay ---------- */
const debugCanvas = document.getElementById("debug-canvas");
const debugCtx = debugCanvas.getContext("2d");

function drawDebug() {
  const w = debugCanvas.width = el.clientWidth;
  const h = debugCanvas.height = el.clientHeight;
  debugCtx.clearRect(0, 0, w, h);

  // belly ellipse (UV → pixel: x = u * w, y = (1 - v) * h since UV origin bottom-left)
  const cx = BELLY.cx * w;
  const cy = (1 - BELLY.cy) * h;
  const rx = BELLY.rx * w;
  const ry = BELLY.ry * h;
  const yMaxY = (1 - BELLY.yMax) * h;

  debugCtx.save();
  debugCtx.strokeStyle = "#ff00ff";
  debugCtx.lineWidth = 1;
  debugCtx.setLineDash([6, 4]);
  debugCtx.beginPath();
  debugCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  debugCtx.stroke();
  debugCtx.setLineDash([]);

  // center dot
  debugCtx.fillStyle = "#ff00ff";
  debugCtx.beginPath();
  debugCtx.arc(cx, cy, 3, 0, Math.PI * 2);
  debugCtx.fill();

  // yMax cutoff line
  debugCtx.strokeStyle = "#00ffff";
  debugCtx.lineWidth = 1;
  debugCtx.setLineDash([4, 4]);
  debugCtx.beginPath();
  debugCtx.moveTo(0, yMaxY);
  debugCtx.lineTo(w, yMaxY);
  debugCtx.stroke();
  debugCtx.setLineDash([]);

  // jiggle vertical boundaries (left + right)
  const jiggleLeftX  = JIGGLE_LEFT * w;
  const jiggleRightX = JIGGLE_RIGHT * w;
  debugCtx.strokeStyle = "#00ff88";
  debugCtx.lineWidth = 1;
  debugCtx.setLineDash([5, 5]);
  debugCtx.beginPath();
  debugCtx.moveTo(jiggleLeftX, 0);
  debugCtx.lineTo(jiggleLeftX, h);
  debugCtx.stroke();
  debugCtx.beginPath();
  debugCtx.moveTo(jiggleRightX, 0);
  debugCtx.lineTo(jiggleRightX, h);
  debugCtx.stroke();
  debugCtx.setLineDash([]);

  // cross-section cutoff (right edge + y center)
  const cutX = (BELLY.cx + BELLY.rx) * w;
  const cutY = (1 - CUTOFF_Y) * h;
  debugCtx.strokeStyle = "#ff4444";
  debugCtx.lineWidth = 1;
  debugCtx.setLineDash([3, 3]);
  debugCtx.beginPath();
  debugCtx.moveTo(cutX, 0);
  debugCtx.lineTo(cutX, h);
  debugCtx.stroke();
  debugCtx.beginPath();
  debugCtx.moveTo(0, cutY);
  debugCtx.lineTo(w, cutY);
  debugCtx.stroke();
  debugCtx.setLineDash([]);
  // orange crosshair (CUTOFF_X3, BELLY.cy)
  const cutX3 = CUTOFF_X3 * w;
  const cutY3 = (1 - BELLY.cy) * h;
  debugCtx.strokeStyle = "#ffaa00";
  debugCtx.lineWidth = 1;
  debugCtx.setLineDash([3, 3]);
  debugCtx.beginPath();
  debugCtx.moveTo(cutX3, 0);
  debugCtx.lineTo(cutX3, h);
  debugCtx.stroke();
  debugCtx.beginPath();
  debugCtx.moveTo(0, cutY3);
  debugCtx.lineTo(w, cutY3);
  debugCtx.stroke();
  debugCtx.setLineDash([]);

  // yellow crosshair
  const mx = MARKER_X * w;
  const my = (1 - MARKER_Y) * h;
  debugCtx.strokeStyle = "#ffff00";
  debugCtx.lineWidth = 1;
  debugCtx.setLineDash([2, 4]);
  debugCtx.beginPath();
  debugCtx.moveTo(mx, 0);
  debugCtx.lineTo(mx, h);
  debugCtx.stroke();
  debugCtx.beginPath();
  debugCtx.moveTo(0, my);
  debugCtx.lineTo(w, my);
  debugCtx.stroke();
  debugCtx.setLineDash([]);

  // diagonal line between red cross (cutX, cutY) and yellow cross (mx, my)
  debugCtx.strokeStyle = "#ff0";
  debugCtx.lineWidth = 2;
  debugCtx.setLineDash([6, 3]);
  debugCtx.beginPath();
  debugCtx.moveTo(cutX, cutY);
  debugCtx.lineTo(mx, my);
  debugCtx.stroke();
  debugCtx.setLineDash([]);

  debugCtx.restore();
}

new ResizeObserver(() => {
  if (showDebug) drawDebug();
}).observe(el);
/* ----------------------------------- */

const ctxDebug = document.getElementById("ctx-debug");
let showDebug = false;

function updateMenuLabels() {
  ctxDebug.textContent = showDebug ? "Hide Jiggle Boundary" : "Show Jiggle Boundary";
}

ctxDebug.addEventListener("click", () => {
  showDebug = !showDebug;
  debugCanvas.style.display = showDebug ? "block" : "none";
  if (showDebug) drawDebug();
  updateMenuLabels();
});

updateMenuLabels();

const ctxMenu = document.getElementById("ctx-menu");

el.addEventListener("contextmenu", e => {
  e.preventDefault();
  ctxMenu.style.display = "block";
  ctxMenu.style.left = e.clientX + "px";
  ctxMenu.style.top  = e.clientY + "px";
});

document.addEventListener("click", e => {
  if (!ctxMenu.contains(e.target)) ctxMenu.style.display = "none";
});

requestAnimationFrame(function tick() {
  requestAnimationFrame(tick);
  uniforms.uTime.value = clock.getElapsedTime();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
